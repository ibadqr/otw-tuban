<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Portal Ekosistem - OTW TUBAN</title>
    
    <!-- === SECURITY GUARD LAYER === -->
    <meta name="robots" content="noindex, nofollow">

    <!-- === ICON & FAVICON CONFIGURATION === -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://img.icons8.com/fluency/32/compass.png">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <!-- === STYLES & FONTS === -->
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- SweetAlert2 (Notifikasi Pop-up Premium) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Google Fonts Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#0b1222] text-slate-100 min-h-screen flex flex-col justify-between antialiased relative overflow-hidden w-full max-w-full">

    <!-- Kunci Mati Efek Latar Belakang (Anti-Bocor / Anti-Geser Space) -->
    <div class="absolute inset-0 max-w-full overflow-hidden pointer-events-none opacity-20 z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[250px] sm:w-[500px] h-[250px] sm:h-[500px] bg-sky-500 rounded-full blur-[80px] sm:blur-[150px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[250px] sm:w-[500px] h-[250px] sm:h-[500px] bg-indigo-600 rounded-full blur-[80px] sm:blur-[150px]"></div>
    </div>

    <!-- Header Atas -->
    <header class="p-4 max-w-7xl mx-auto w-full flex items-center justify-between relative z-10 shrink-0">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-compass text-xl text-transparent bg-clip-text bg-gradient-to-tr from-sky-400 to-indigo-500"></i>
            <span class="text-xs font-black text-white tracking-wider">OTW <span class="text-amber-500">TUBAN</span></span>
        </div>
        <a href="../index.html" class="text-[10px] sm:text-xs font-bold text-slate-400 hover:text-white transition duration-200 flex items-center gap-1.5">
            <i class="fa-solid fa-arrow-left-long"></i> Beranda
        </a>
    </header>

    <!-- Kotak Form Login Sentral (Kunci Mati Ditengah Tanpa Pergeseran Piksel) -->
    <main class="w-full max-w-md mx-auto px-4 py-4 relative z-10 flex-grow flex flex-col justify-center items-center box-border">
        <div class="bg-slate-950/70 border border-slate-800/80 p-5 sm:p-8 rounded-2xl sm:rounded-3xl w-full max-w-full box-border backdrop-blur-xl shadow-2xl space-y-5">
            
            <!-- Judul Pintu Masuk Portal -->
            <div class="text-center space-y-1.5">
                <div class="h-10 w-10 bg-gradient-to-tr from-sky-500 to-indigo-600 rounded-xl flex items-center justify-center font-black text-white text-base mx-auto shadow-md">
                    <i class="fa-solid fa-lock text-xs"></i>
                </div>
                <h1 class="text-base sm:text-lg font-black text-white tracking-tight pt-1">Autentikasi Internal</h1>
                <p class="text-[10px] sm:text-xs text-slate-400 font-medium max-w-[260px] mx-auto leading-relaxed">Khusus kontributor data Bumi Wali Tuban.</p>
            </div>

            <!-- Interaksi Form -->
            <form id="loginForm" onsubmit="handleAdminLogin(event)" class="space-y-4 w-full block">
                
                <!-- Input Bidang Email -->
                <div class="space-y-1">
                    <label for="emailInput" class="text-[10px] font-bold uppercase tracking-widest text-slate-400 block">Email Kontributor</label>
                    <div class="relative w-full">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500 text-xs pointer-events-none">
                            <i class="fa-solid fa-envelope"></i>
                        </span>
                        <input type="email" id="emailInput" required class="w-full bg-slate-900 border border-slate-800 rounded-xl pl-9 pr-3 py-2.5 text-slate-200 text-xs sm:text-sm focus:outline-none focus:ring-2 focus:ring-sky-500/50 transition duration-150 box-border" placeholder="nama@instansi.com">
                    </div>
                </div>

                <!-- Input Bidang Kata Sandi -->
                <div class="space-y-1">
                    <label for="passwordInput" class="text-[10px] font-bold uppercase tracking-widest text-slate-400 block">Kata Sandi</label>
                    <div class="relative w-full">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500 text-xs pointer-events-none">
                            <i class="fa-solid fa-key"></i>
                        </span>
                        <input type="password" id="passwordInput" required class="w-full bg-slate-900 border border-slate-800 rounded-xl pl-9 pr-9 py-2.5 text-slate-200 text-xs sm:text-sm focus:outline-none focus:ring-2 focus:ring-sky-500/50 transition duration-150 box-border" placeholder="••••••••">
                        <!-- Toggle Tombol Intip Password -->
                        <button type="button" onclick="togglePasswordVisibility()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-300 transition cursor-pointer">
                            <i id="eyeIcon" class="fa-solid fa-eye text-xs"></i>
                        </button>
                    </div>
                </div>

                <!-- Aksi Pengajuan Login -->
                <div class="pt-1">
                    <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-sky-500 to-indigo-600 hover:from-sky-600 hover:to-indigo-700 text-white font-black text-xs py-3 rounded-xl transition duration-150 flex items-center justify-center gap-2 shadow-lg cursor-pointer box-border">
                        <i class="fa-solid fa-right-to-bracket"></i> Masuk Jaringan Cloud
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer Bawah -->
    <footer class="p-3 text-center text-[9px] text-slate-600 font-semibold relative z-10 shrink-0">
        <p>Sistem Keamanan Deteksi Sesi Terpusat OTW TUBAN &copy; 2026.</p>
    </footer>

    <!-- === CORE LOGIN ENGINE CODE === -->
    <script>
        const SUPABASE_URL = "https://aeeytzzhfoqacqajrfmy.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFlZXl0enpoZm9xYWNxYWpyZm15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTQzNTYsImV4cCI6MjA5ODk3MDM1Nn0.Bfk_iBR9KqnYBhaMwUiiLcMXcDIzCIZVQybczZ4eihA";
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function togglePasswordVisibility() {
            const pwdInput = document.getElementById('passwordInput');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                eyeIcon.className = 'fa-solid fa-eye-slash text-xs';
            } else {
                pwdInput.type = 'password';
                eyeIcon.className = 'fa-solid fa-eye text-xs';
            }
        }

        async function handleAdminLogin(event) {
            event.preventDefault();

            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const submitBtn = document.getElementById('submitBtn');

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin"></i>`;

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                Swal.fire({
                    icon: 'success',
                    title: 'Akses Diterima!',
                    text: 'Membuka gerbang console...',
                    background: '#0f172a',
                    color: '#f8fafc',
                    confirmButtonColor: '#0ea5e9',
                    timer: 1500,
                    showConfirmButton: false
                });

                setTimeout(() => {
                    window.location.href = "admin/dashboard.html";
                }, 1300);

            } catch (err) {
                Swal.fire({
                    icon: 'error',
                    title: 'Akses Gagal!',
                    text: err.message === "Invalid login credentials" 
                        ? "Email atau Kata Sandi Anda salah!" 
                        : err.message,
                    background: '#0f172a',
                    color: '#f8fafc',
                    confirmButtonColor: '#e11d48'
                });

                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fa-solid fa-right-to-bracket"></i> Masuk Jaringan Cloud`;
            }
        }

        async function checkExistingSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = "dashboard.html";
            }
        }
        checkExistingSession();
    </script>
</body>
</html>
